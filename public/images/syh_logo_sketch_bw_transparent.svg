<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="pencilTexture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise" seed="7"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5"/>
    </filter>
    <filter id="pencilTextureSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" result="noise" seed="3"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
  </defs>

  <g filter="url(#pencilTexture)" stroke="#111111" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer circle, double-stroked for sketch depth -->
    <circle cx="200" cy="190" r="138" stroke-width="5"/>
    <circle cx="200" cy="190" r="138" stroke-width="2" opacity="0.5" transform="rotate(1 200 190)"/>

    <!-- vertical bar of peace / stem of the Y -->
    <path d="M200,55 L199,130 L201,190" stroke-width="9"/>
    <path d="M200,55 L199,130 L201,190" stroke-width="3" opacity="0.4" transform="translate(1,0)"/>

    <!-- left diagonal arm -->
    <path d="M200,190 L146,280" stroke-width="9"/>
    <path d="M200,190 L146,280" stroke-width="3" opacity="0.4" transform="translate(-1,1)"/>

    <!-- right diagonal arm -->
    <path d="M200,190 L254,280" stroke-width="9"/>
    <path d="M200,190 L254,280" stroke-width="3" opacity="0.4" transform="translate(1,1)"/>
  </g>

  <!-- cross-hatch pencil shading accents on the ring -->
  <g stroke="#111111" stroke-width="1.3" opacity="0.55" filter="url(#pencilTextureSoft)">
    <path d="M75,150 L95,140"/>
    <path d="M78,160 L98,150"/>
    <path d="M82,170 L102,160"/>
    <path d="M300,220 L320,212"/>
    <path d="M296,232 L316,224"/>
    <path d="M292,244 L312,236"/>
  </g>

  <!-- letter S, hand-lettered, sitting inside the left pocket -->
  <g filter="url(#pencilTexture)" fill="none" stroke="#111111" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M168,225 C158,218 140,220 140,232 C140,245 172,244 172,258 C172,270 152,272 142,264"/>
  </g>

  <!-- letter H, hand-lettered, sitting inside the right pocket -->
  <g filter="url(#pencilTexture)" fill="none" stroke="#111111" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M228,222 L228,265"/>
    <path d="M258,222 L258,265"/>
    <path d="M228,244 L258,244"/>
  </g>

  <!-- small sketchy accent marks for youthful energy -->
  <g stroke="#111111" stroke-width="2" opacity="0.7" filter="url(#pencilTextureSoft)" fill="none" stroke-linecap="round">
    <path d="M340,110 L352,100 M348,118 L360,112"/>
    <path d="M45,95 L58,88 M40,105 L52,100"/>
  </g>

  <!-- SYH wordmark below, hand-drawn marker style -->
  <text x="200" y="360" text-anchor="middle"
        font-family="'Segoe Print','Comic Sans MS',cursive" font-weight="700"
        font-size="46" fill="#111111" filter="url(#pencilTexture)"
        style="letter-spacing:4px">SYH</text>

  <!-- underline scribble -->
  <path d="M120,372 L155,368 L170,375 L230,366 L280,373"
        fill="none" stroke="#111111" stroke-width="3" stroke-linecap="round"
        filter="url(#pencilTextureSoft)"/>
</svg>
